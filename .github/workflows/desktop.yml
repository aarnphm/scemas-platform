name: desktop

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            postgresql-16

      - name: install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install postgresql@16

      - name: bundle postgres binaries
        if: runner.os != 'Windows'
        run: bash scripts/bundle-postgres.sh

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install frontend deps
        run: bun install

      - name: build frontend
        run: bun --filter @scemas/desktop build

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/scemas-desktop
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}
          tagName: desktop-v__VERSION__
          releaseName: "SCEMAS Desktop v__VERSION__"
          releaseBody: "cross-platform desktop release"
          releaseDraft: true
          prerelease: false
